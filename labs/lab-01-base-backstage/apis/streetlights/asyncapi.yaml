asyncapi: 2.6.0
info:
  title: Streetlights API
  version: 1.0.0
  description: >
    The Streetlights API allows you to manage and monitor a network of smart streetlights.
    Streetlights publish light measurement events when their sensors detect changes, and they
    subscribe to turn-on, turn-off, and dim commands. This is a sample AsyncAPI specification
    used in Lab 1 to demonstrate AsyncAPI catalog registration in Backstage.
  contact:
    name: Streetlights Support
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  production:
    url: mqtt://example.com
    protocol: mqtt
    description: Production MQTT broker for streetlight telemetry.

defaultContentType: application/json

channels:
  smartylighting/streetlights/1/0/event/{streetlightId}/lighting/measured:
    description: >
      A streetlight publishes a measurement event to this channel whenever its
      light sensor records a new value. Subscribe to receive real-time lighting data.
    parameters:
      streetlightId:
        $ref: "#/components/parameters/streetlightId"
    publish:
      summary: Lighting measurement event
      description: >
        Published by the streetlight hardware whenever a light level measurement
        is taken. The `lumens` field contains the measured brightness.
      operationId: receiveLightMeasurement
      traits:
        - $ref: "#/components/operationTraits/kafka"
      message:
        $ref: "#/components/messages/LightMeasured"

  smartylighting/streetlights/1/0/action/{streetlightId}/turn/on:
    description: Command channel to turn a specific streetlight on.
    parameters:
      streetlightId:
        $ref: "#/components/parameters/streetlightId"
    subscribe:
      summary: Turn streetlight on
      operationId: turnOn
      traits:
        - $ref: "#/components/operationTraits/kafka"
      message:
        $ref: "#/components/messages/TurnOnOff"

  smartylighting/streetlights/1/0/action/{streetlightId}/turn/off:
    description: Command channel to turn a specific streetlight off.
    parameters:
      streetlightId:
        $ref: "#/components/parameters/streetlightId"
    subscribe:
      summary: Turn streetlight off
      operationId: turnOff
      traits:
        - $ref: "#/components/operationTraits/kafka"
      message:
        $ref: "#/components/messages/TurnOnOff"

  smartylighting/streetlights/1/0/action/{streetlightId}/dim:
    description: Command channel to dim a specific streetlight to a given percentage.
    parameters:
      streetlightId:
        $ref: "#/components/parameters/streetlightId"
    subscribe:
      summary: Dim streetlight
      operationId: dimLight
      traits:
        - $ref: "#/components/operationTraits/kafka"
      message:
        $ref: "#/components/messages/DimLight"

components:
  messages:
    LightMeasured:
      name: LightMeasured
      title: Light measured
      summary: Notification that a streetlight has recorded a new light measurement.
      contentType: application/json
      traits:
        - $ref: "#/components/messageTraits/commonHeaders"
      payload:
        $ref: "#/components/schemas/LightMeasuredPayload"

    TurnOnOff:
      name: TurnOnOff
      title: Turn on/off
      summary: Command to turn a streetlight on or off.
      traits:
        - $ref: "#/components/messageTraits/commonHeaders"
      payload:
        $ref: "#/components/schemas/TurnOnOffPayload"

    DimLight:
      name: DimLight
      title: Dim light
      summary: Command to dim a streetlight to a specified brightness percentage.
      traits:
        - $ref: "#/components/messageTraits/commonHeaders"
      payload:
        $ref: "#/components/schemas/DimLightPayload"

  schemas:
    LightMeasuredPayload:
      type: object
      properties:
        id:
          type: integer
          minimum: 0
          description: Unique identifier of the streetlight.
        lumens:
          type: integer
          minimum: 0
          description: Measured light intensity in lumens.
        sentAt:
          $ref: "#/components/schemas/SentAt"
      required:
        - id
        - lumens
        - sentAt

    TurnOnOffPayload:
      type: object
      properties:
        command:
          type: string
          enum: [on, off]
          description: Whether to turn the light on or off.
        sentAt:
          $ref: "#/components/schemas/SentAt"
      required:
        - command
        - sentAt

    DimLightPayload:
      type: object
      properties:
        percentage:
          type: integer
          minimum: 0
          maximum: 100
          description: Percentage to dim the light to (0 = off, 100 = full brightness).
        sentAt:
          $ref: "#/components/schemas/SentAt"
      required:
        - percentage
        - sentAt

    SentAt:
      type: string
      format: date-time
      description: Timestamp when the message was sent (ISO 8601).
      example: "2024-01-15T12:00:00Z"

  parameters:
    streetlightId:
      description: The unique identifier of the streetlight.
      schema:
        type: string

  messageTraits:
    commonHeaders:
      headers:
        type: object
        properties:
          correlationId:
            description: >
              Correlation ID set by the producer. Used to trace a command back to the
              original event that triggered it.
            type: string
          applicationInstanceId:
            description: Unique identifier for the application instance sending the message.
            type: string

  operationTraits:
    kafka:
      bindings:
        kafka:
          clientId:
            type: string
            enum: [my-app-id]

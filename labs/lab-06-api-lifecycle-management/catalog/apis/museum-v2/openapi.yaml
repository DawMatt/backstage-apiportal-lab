openapi: 3.1.0
info:
  title: Museum API
  description: >
    An API for getting information about the museum, its special events, and purchasing
    tickets. This is a sample API used in the Backstage API Portal Lab to demonstrate
    OpenAPI catalog registration.


    **Version 2 changes (Lab 6, deliberate breaking changes vs. v1):**
    - The `/special-events/{eventId}` path parameter is renamed to `{id}`, and the matching
      `SpecialEventResponse.eventId` field is renamed to `id`.
    - `GET /tickets/{ticketId}/qr` is renamed to `GET /tickets/{ticketId}/qr-code`.

    See labs/lab-06-api-lifecycle-management/README.md for why these specific changes were
    chosen and what a real consumer would need to do to migrate from v1.
  version: 2.0.0
  contact:
    name: Museum Support
    email: support@example.museum

servers:
  - url: https://api.example.museum/v2
    description: Production server

tags:
  - name: Operations
    description: Museum operating information
  - name: Events
    description: Special events at the museum
  - name: Tickets
    description: Ticket purchasing and management

paths:
  /museum-hours:
    get:
      summary: Get museum hours
      description: >
        Returns the opening hours for the museum. Hours may vary on public holidays —
        check the special events endpoint for closures.
      operationId: getMuseumHours
      tags:
        - Operations
      parameters:
        - name: startDate
          in: query
          description: The start date to retrieve hours from (inclusive). Defaults to today.
          schema:
            type: string
            format: date
            example: "2024-02-01"
        - name: page
          in: query
          description: The page number to retrieve.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: The number of days per page.
          schema:
            type: integer
            default: 7
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: Museum opening hours returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetMuseumHoursResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /special-events:
    get:
      summary: List special events
      description: >
        Returns a paginated list of special events at the museum. Events are sorted by
        start date, most recent first.
      operationId: listSpecialEvents
      tags:
        - Events
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: List of special events returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSpecialEventsResponse"

    post:
      summary: Create a special event
      description: >
        Creates a new special event. The event is created in draft status and must be
        published before it appears in the public listing.
      operationId: createSpecialEvent
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpecialEventRequest"
      responses:
        "201":
          description: Special event created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialEventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /special-events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: >
          Unique identifier for the special event. Renamed from `eventId` in v1 — see the
          v2 changelog note in this file's `info.description`.
        schema:
          type: string
          format: uuid

    get:
      summary: Get a special event
      operationId: getSpecialEvent
      tags:
        - Events
      responses:
        "200":
          description: Special event details returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialEventResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: Update a special event
      operationId: updateSpecialEvent
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpecialEventRequest"
      responses:
        "200":
          description: Special event updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialEventResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete a special event
      operationId: deleteSpecialEvent
      tags:
        - Events
      responses:
        "204":
          description: Special event deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"

  /special-events/{id}/publish:
    post:
      summary: Publish a special event
      description: >
        Publishes a draft special event, making it visible in the public listing.
        Published events cannot be unpublished, only deleted.
      operationId: publishSpecialEvent
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Special event published successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecialEventResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /tickets:
    post:
      summary: Buy museum tickets
      description: >
        Purchases one or more tickets for a museum visit or special event. Returns a
        ticket ID that can be used to retrieve a QR code for entry.
      operationId: buyMuseumTickets
      tags:
        - Tickets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyMuseumTicketsRequest"
      responses:
        "201":
          description: Tickets purchased successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuyMuseumTicketsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /tickets/{ticketId}/qr-code:
    get:
      summary: Get ticket QR code
      description: >
        Returns a QR code image for the specified ticket. Present this at the museum
        entrance for admission. Renamed from `/tickets/{ticketId}/qr` in v1 — see the v2
        changelog note in this file's `info.description`.
      operationId: getTicketQrCode
      tags:
        - Tickets
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: QR code image returned successfully.
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

components:
  schemas:
    MuseumDayHours:
      type: object
      description: Opening hours for a single day.
      properties:
        date:
          type: string
          format: date
          description: The date these hours apply to.
          example: "2024-02-01"
        timeOpen:
          type: string
          description: Opening time (24-hour format).
          example: "09:00"
        timeClose:
          type: string
          description: Closing time (24-hour format).
          example: "17:00"
      required:
        - date
        - timeOpen
        - timeClose

    GetMuseumHoursResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MuseumDayHours"

    SpecialEventResponse:
      type: object
      description: A special event at the museum.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the event. Renamed from `eventId` in v1.
        name:
          type: string
          description: The name of the event.
          example: "Mermaid Legends"
        location:
          type: string
          description: Where the event takes place within the museum.
          example: "Section D"
        eventDescription:
          type: string
          description: A description of the event.
        dates:
          type: array
          description: Dates on which the event takes place.
          items:
            type: string
            format: date
        price:
          type: number
          format: float
          description: Ticket price in USD.
          example: 25.00
        status:
          type: string
          enum: [draft, published]
          description: Publication status of the event.
      required:
        - id
        - name
        - location
        - dates
        - price
        - status

    ListSpecialEventsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SpecialEventResponse"
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer

    CreateSpecialEventRequest:
      type: object
      required:
        - name
        - location
        - dates
        - price
      properties:
        name:
          type: string
          example: "Mermaid Legends"
        location:
          type: string
          example: "Section D"
        eventDescription:
          type: string
        dates:
          type: array
          items:
            type: string
            format: date
        price:
          type: number
          format: float
          example: 25.00

    UpdateSpecialEventRequest:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        eventDescription:
          type: string
        dates:
          type: array
          items:
            type: string
            format: date
        price:
          type: number
          format: float

    BuyMuseumTicketsRequest:
      type: object
      required:
        - ticketType
        - ticketDate
        - email
      properties:
        ticketType:
          type: string
          enum: [general, special]
          description: Type of ticket — general admission or a special event.
        ticketDate:
          type: string
          format: date
          description: The date the ticket is valid for.
        eventId:
          type: string
          format: uuid
          description: Required when ticketType is "special". Refers to the special event's `id`.
        email:
          type: string
          format: email
          description: Email address to send the ticket confirmation to.

    BuyMuseumTicketsResponse:
      type: object
      properties:
        ticketId:
          type: string
          format: uuid
          description: Unique ticket identifier. Use this to retrieve the QR code.
        ticketType:
          type: string
          enum: [general, special]
        ticketDate:
          type: string
          format: date
        confirmationCode:
          type: string
          example: "ticket-ABC123"
      required:
        - ticketId
        - ticketType
        - ticketDate
        - confirmationCode

    Error:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
      required:
        - type
        - title
        - status

  responses:
    BadRequest:
      description: Bad request — invalid input parameters.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Error"

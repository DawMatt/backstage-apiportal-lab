# Lab 6 — Museum API, version 2.
#
# A new major version of the Museum API, registered alongside (not replacing) v1. Its spec
# contains deliberate breaking changes vs. v1 — see catalog/apis/museum-v2/openapi.yaml's
# info.description for the exact changelog. Starts life at lifecycle: development, and is
# advanced through testing -> production during the lab walkthrough (README Step 6).

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: museum-api-v2
  description: >
    Museum API — version 2. Introduces breaking changes to special-event identifiers and
    the ticket QR-code endpoint; see catalog/apis/museum-v2/openapi.yaml's changelog.
  tags:
    - rest
    - openapi
    - sample
  annotations:
    example.com/visibility: private
    # Lab 6: major.minor version identifier, used to sort versions and compute "latest".
    apiportal.io/version: "2.0"
spec:
  type: openapi
  lifecycle: testing
  owner: group:default/museum-team
  system: museum-api
  definition:
    # NOTE: points at this feature branch, not main, because this spec file doesn't exist on
    # main yet — same convention as Lab 4's precedence-demo entry. Update to main once merged.
    $text: https://raw.githubusercontent.com/DawMatt/backstage-apiportal-lab/006-api-lifecycle-management/labs/lab-06-api-lifecycle-management/catalog/apis/museum-v2/openapi.yaml

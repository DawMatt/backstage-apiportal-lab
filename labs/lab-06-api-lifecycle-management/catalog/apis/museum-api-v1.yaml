# Lab 6 — Museum API, version 1.
#
# Supersedes Lab 2's single `museum-api` catalog entry (labs/lab-02-users-roles/catalog/apis/
# museum-api.yaml) — see labs/lab-06-api-lifecycle-management/README.md for why this lab
# introduces explicitly-versioned entity names instead of continuing to evolve one unversioned
# entity. The referenced OpenAPI file itself is untouched — this is a new catalog descriptor
# only, pointing at the same spec Lab 1 already registered.

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: museum-api-v1
  description: >
    A sample REST API for a fictional museum, demonstrating modern OpenAPI 3.1 design
    practices. Covers special events, museum hours, and ticket purchasing. Version 1 —
    see museum-api-v2 for the next major version and its breaking changes.
  tags:
    - rest
    - openapi
    - sample
  annotations:
    # Same visibility mechanism introduced in Lab 2 — unchanged, applies per version.
    example.com/visibility: private
    # Lab 6: major.minor version identifier, used to sort versions and compute "latest".
    apiportal.io/version: "1.0"
spec:
  type: openapi
  lifecycle: deprecated
  owner: group:default/museum-team
  system: museum-api
  definition:
    $text: https://raw.githubusercontent.com/DawMatt/backstage-apiportal-lab/main/labs/lab-01-base-backstage/apis/museum/openapi.yaml

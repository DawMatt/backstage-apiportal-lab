# Lab 2 — Museum API catalog descriptor (updated from Lab 1)
#
# Changes from Lab 1:
#   - spec.owner added: group:default/museum-team
#   - spec.lifecycle changed from experimental to production
#   - spec.definition.$text now uses a full GitHub raw URL (required when the
#     descriptor and the spec file are not in the same directory)
#   - example.com/visibility: private annotation added (display + permission policy)
#   - 'private' tag added for prominent display in the Backstage catalog UI

apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: museum-api
  description: >
    A sample REST API for a fictional museum, demonstrating modern OpenAPI 3.1 design
    practices. Covers special events, museum hours, and ticket purchasing.
  tags:
    - rest
    - openapi
    - sample
    - private
  annotations:
    # This annotation marks the API as private (team-restricted).
    # The custom permission policy restricts access via isEntityOwner — only museum-team
    # members can see this API. The annotation is for display: it makes the visibility
    # designation visible to anyone viewing this API's catalog page.
    # Note: example.com is a fictional annotation domain used for lab purposes only.
    example.com/visibility: private
spec:
  type: openapi
  lifecycle: production
  owner: group:default/museum-team
  definition:
    $text: https://raw.githubusercontent.com/DawMatt/backstage-apiportal-lab/main/labs/lab-01-base-backstage/apis/museum/openapi.yaml

# Lab 2 — Group (team) entities
#
# Both groups MUST list their members here, AND each User entity MUST declare
# memberOf pointing back to the group. Backstage requires both sides to build
# the bidirectional hasMember / memberOf relations used by the permissions framework.
#
# All member names are fictional example values only.

apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: museum-team
  namespace: default
  description: The team responsible for the Museum REST API.
spec:
  type: team
  profile:
    displayName: Museum Team
  children: []
  members:
    - alice
    - bob
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: streetlights-team
  namespace: default
  description: The team responsible for the Streetlights Event API.
spec:
  type: team
  profile:
    displayName: Streetlights Team
  children: []
  members:
    - charlie
    - diana
---
# platform-team owns shared platform APIs that are visible to all authenticated users.
# Lab 3 addition: eve is added as the first platform team member to demonstrate
# cross-API quality visibility for platform engineers.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  namespace: default
  description: >
    Owns shared platform APIs and is responsible for the Backstage developer portal.
    Platform team members can view detailed API quality information for all APIs
    regardless of ownership.
spec:
  type: team
  profile:
    displayName: Platform Team
  children: []
  members:
    - eve        # added in Lab 3 — platform team member
